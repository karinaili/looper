<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOOPER</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0e0e0e;color:#e8e8e8;font-family:'SF Mono','Fira Code',monospace;display:flex;flex-direction:column;align-items:center;min-height:100vh;gap:20px;padding:28px 20px;-webkit-font-smoothing:antialiased}
h1{font-size:18px;letter-spacing:.35em;font-weight:700;opacity:.9}
#status{font-size:11px;letter-spacing:.12em;color:#555;text-transform:uppercase;min-height:16px;text-align:center}
.ring-wrap{position:relative;width:150px;height:150px}
svg{width:100%;height:100%;transform:rotate(-90deg)}
.rbg{fill:none;stroke:#1c1c1c;stroke-width:6}
.rfg{fill:none;stroke:#3cdc78;stroke-width:6;stroke-linecap:round;stroke-dasharray:408;stroke-dashoffset:408;transition:stroke .2s}
.rfg.rec{stroke:#e8453c}
.rfg.waiting{stroke:#ff8c42;animation:pulse .6s ease-in-out infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:.3}}
.ring-in{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.rt{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums}
.rl{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#555}

/* Controls */
.ctrl{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
button{padding:12px 20px;border:1px solid #2a2a2a;border-radius:5px;background:#141414;color:#aaa;font-family:inherit;font-size:10px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .12s;min-width:90px}
button:hover:not(:disabled){border-color:#444;background:#1a1a1a;color:#e8e8e8}
button:disabled{opacity:.25;cursor:not-allowed}
button:active:not(:disabled){transform:scale(.95)}
#btnRec{border-color:rgba(232,69,60,.35);color:#e8453c}
#btnRec:hover:not(:disabled){border-color:#e8453c;background:rgba(232,69,60,.1)}
#btnRec.armed{border-color:#ff8c42;color:#ff8c42;background:rgba(255,140,66,.08);animation:pulse .7s ease-in-out infinite alternate}
#btnRec.recording{border-color:#e8453c;color:#e8453c;background:rgba(232,69,60,.12);animation:pulse .6s ease-in-out infinite alternate}
#btnLayer{border-color:rgba(255,140,66,.35);color:#ff8c42}
#btnLayer:hover:not(:disabled){border-color:#ff8c42;background:rgba(255,140,66,.1)}
#btnLayer.armed{border-color:#ff8c42;color:#ff8c42;background:rgba(255,140,66,.1);animation:pulse .7s ease-in-out infinite alternate}
#btnLayer.recording{border-color:#ff8c42;color:#ff8c42;background:rgba(255,140,66,.15);animation:pulse .6s ease-in-out infinite alternate}

/* Tracks */
#tracks{width:100%;max-width:420px;display:flex;flex-direction:column;gap:7px}
.empty{font-size:10px;letter-spacing:.1em;color:#333;text-transform:uppercase;text-align:center;padding:24px 0}
.track{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#141414;border:1px solid #222;border-radius:5px;transition:opacity .2s}
.track.muted{opacity:.35}
.tnum{font-size:10px;color:#444;min-width:18px}
.tbar{flex:1;height:22px;background:#0a0a0a;border-radius:3px;position:relative;overflow:hidden}
.tbar canvas{display:block;width:100%;height:100%}
.tph{position:absolute;top:0;bottom:0;width:2px;background:#3cdc78;opacity:.6;pointer-events:none}
.track.muted .tph{display:none}
.tbtn{padding:3px 9px;border:1px solid #222;border-radius:3px;background:transparent;color:#444;font-family:inherit;font-size:9px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .1s;white-space:nowrap}
.tbtn:hover{border-color:#444;color:#aaa}
.tbtn.active{border-color:#e8453c;color:#e8453c}

/* Latency note */
#latencyNote{font-size:9px;letter-spacing:.08em;color:#333;text-transform:uppercase;text-align:center}
</style>

</head>
<body>
<h1>LOOPER</h1>
<div id="status">ready</div>

<div class="ring-wrap">
  <svg viewBox="0 0 130 130">
    <circle class="rbg" cx="65" cy="65" r="55"/>
    <circle class="rfg" id="rfg" cx="65" cy="65" r="55"/>
  </svg>
  <div class="ring-in">
    <div class="rt" id="rtime">--</div>
    <div class="rl" id="rlbl">no loop</div>
  </div>
</div>

<div class="ctrl">
  <button id="btnRec">⏺ record</button>
  <button id="btnLayer" disabled>+ layer</button>
  <button id="btnStop" disabled>⏹ stop</button>
</div>
<div class="ctrl">
  <button id="btnUndo" disabled>↩ undo</button>
  <button id="btnClear" disabled>✕ clear</button>
</div>
<div id="latencyNote"></div>

<div id="tracks"><div class="empty" id="emptyMsg">record first loop to start</div></div>

<script>
// ════════════════════════════════════════════════════
//  LOOPER with quantized recording & latency compensation
//
//  Key ideas:
//  1. QUANTIZE: layer recording starts at exact loop boundary,
//     not when button is pressed. Button press = "arm" → actual
//     record starts at next cycle boundary via AudioContext scheduling.
//
//  2. LATENCY COMPENSATION: AudioContext has input latency
//     (mic → buffer) and output latency (buffer → speakers).
//     We offset the recorded audio backward by baseLatency + inputLatency.
//
//  3. OVERDUB BUFFER: We start MediaRecorder slightly before the
//     loop boundary (1 full cycle early) so we capture audio that
//     started before the boundary, then trim the buffer precisely.
// ════════════════════════════════════════════════════

const CIRC = 2 * Math.PI * 55; // ring circumference

// DOM
const btnRec   = document.getElementById('btnRec');
const btnLayer = document.getElementById('btnLayer');
const btnStop  = document.getElementById('btnStop');
const btnUndo  = document.getElementById('btnUndo');
const btnClear = document.getElementById('btnClear');
const rfg      = document.getElementById('rfg');
const rtime    = document.getElementById('rtime');
const rlbl     = document.getElementById('rlbl');
const statusEl = document.getElementById('status');
const trackList= document.getElementById('tracks');
const emptyMsg = document.getElementById('emptyMsg');
const latNote  = document.getElementById('latencyNote');

rfg.style.strokeDasharray  = CIRC;
rfg.style.strokeDashoffset = CIRC;

// State
let ctx, stream;
let loopDur = 0, loopStart = 0;
let tracks = [];
let raf = null;

// Recording state
const REC_STATE = { IDLE:'idle', ARMED_FIRST:'armed_first', RECORDING_FIRST:'recording_first', ARMED_LAYER:'armed_layer', RECORDING_LAYER:'recording_layer' };
let recState = REC_STATE.IDLE;
let recorder = null, recChunks = [];
let recArmTime = 0;       // audioCtx time when recording actually started
let inputLatency = 0;     // estimated input latency in seconds

// ── INIT ──────────────────────────────────────────
async function initAudio() {
  if (ctx) return true;
  try {
    ctx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'interactive' });
  } catch(e) { alert('Web Audio API not supported'); return false; }

  try {
    // Request mic with echoCancellation off for clean looping
    stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
    });
  } catch(e) {
    alert('Mic denied.\nOpen this page over https:// and allow microphone access.');
    ctx.close(); ctx = null; return false;
  }

  // Measure latency
  await ctx.resume();
  inputLatency = (ctx.baseLatency || 0) + (ctx.inputLatency || 0);
  if (inputLatency > 0) {
    latNote.textContent = `latency compensation: ${Math.round(inputLatency*1000)}ms`;
  }
  return true;
}

// ── FIRST LOOP ────────────────────────────────────
async function armFirst() {
  if (!(await initAudio())) return;
  await ctx.resume();
  recState = REC_STATE.ARMED_FIRST;
  setStatus('armed — play and stop when ready');
  ui();
  // Start recording immediately for first loop (no quantize needed)
  beginRecording();
  recState = REC_STATE.RECORDING_FIRST;
  ui();
}

// ── ADD LAYER ─────────────────────────────────────
async function armLayer() {
  if (!loopDur) return;
  recState = REC_STATE.ARMED_LAYER;
  setStatus('armed — will start at next loop boundary');
  ui();

  // Calculate time until next loop boundary
  const now     = ctx.currentTime;
  const elapsed = (now - loopStart) % loopDur;
  const toNext  = loopDur - elapsed;

  // Start MediaRecorder slightly early (one cycle before boundary)
  // so we have audio buffered right at the moment the loop starts.
  // We'll trim precisely after decode.
  const preRoll = Math.min(toNext, loopDur); // start recording now
  recArmTime = now + toNext; // exact time recording "officially" starts

  beginRecording(); // start capturing audio now (pre-roll)

  // Transition to RECORDING at exact boundary
  setTimeout(() => {
    if (recState === REC_STATE.ARMED_LAYER) {
      recState = REC_STATE.RECORDING_LAYER;
      setStatus('recording layer…');
      ui();
    }
  }, toNext * 1000);

  // Auto-stop at next boundary after that
  setTimeout(() => {
    if (recState === REC_STATE.RECORDING_LAYER) {
      stopRecording();
    }
  }, (toNext + loopDur) * 1000);
}

// ── BEGIN RECORDING (MediaRecorder) ───────────────
function beginRecording() {
  recChunks = [];
  const mime = ['audio/webm;codecs=opus','audio/webm','audio/ogg','audio/mp4']
    .find(t => MediaRecorder.isTypeSupported(t)) || '';
  try {
    recorder = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
  } catch(e) {
    recorder = new MediaRecorder(stream);
  }
  recorder.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
  recorder.onstop = finishRecording;
  recorder.start(20); // 20ms chunks for fine granularity
}

// ── STOP ──────────────────────────────────────────
function stopRecording() {
  if (!recorder || recorder.state === 'inactive') {
    recState = REC_STATE.IDLE; ui(); return;
  }
  recorder.stop();
}

// ── FINISH & PROCESS ──────────────────────────────
async function finishRecording() {
  const wasFirst = recState === REC_STATE.RECORDING_FIRST;
  const wasLayer = recState === REC_STATE.RECORDING_LAYER;
  recState = REC_STATE.IDLE;

  if (!recChunks.length) { ui(); return; }

  const blob = new Blob(recChunks, { type: recChunks[0].type || 'audio/webm' });
  const ab   = await blob.arrayBuffer();
  let rawBuf;
  try { rawBuf = await ctx.decodeAudioData(ab); }
  catch(e) { setStatus('decode error — try again'); ui(); return; }

  if (wasFirst) {
    // First loop: use as-is, set master duration
    loopDur   = rawBuf.duration;
    loopStart = ctx.currentTime; // loops start NOW
    addTrack(rawBuf);
    scheduleAll();
    startAnim();

  } else if (wasLayer) {
    // Layer: trim to exactly one loop duration, compensating for latency
    // The raw buffer contains: preRoll audio + one loop of recording
    // recArmTime = audioCtx time when loop boundary was
    // We need to find the sample offset corresponding to the boundary.

    const sampleRate  = rawBuf.sampleRate;
    const now         = ctx.currentTime;

    // How long ago did recording start? (MediaRecorder started before arm time)
    // The arm time marks the "true" start of the loop
    const recStartedAt  = recArmTime - loopDur; // when MediaRecorder.start() was called
    const preRollSecs   = recArmTime - recStartedAt; // = loopDur
    const preRollSamples= Math.round(preRollSecs * sampleRate);
    const loopSamples   = Math.round(loopDur * sampleRate);

    // Account for input latency: shift start point earlier
    const latSamples = Math.round(inputLatency * sampleRate);
    const startSample = Math.max(0, preRollSamples - latSamples);
    const endSample   = Math.min(rawBuf.length, startSample + loopSamples);

    const fitted = ctx.createBuffer(rawBuf.numberOfChannels, loopSamples, sampleRate);
    for (let ch = 0; ch < rawBuf.numberOfChannels; ch++) {
      const src = rawBuf.getChannelData(ch);
      const dst = fitted.getChannelData(ch);
      const copyLen = Math.min(endSample - startSample, loopSamples);
      if (startSample < src.length) {
        dst.set(src.subarray(startSample, startSample + copyLen));
      }
    }

    addTrack(fitted);
    scheduleTrack(tracks[tracks.length - 1]);
  }

  ui();
}

// ── TRACKS ────────────────────────────────────────
function addTrack(buf) {
  const gain = ctx.createGain();
  gain.connect(ctx.destination);
  const t = { id: Date.now(), buf, gain, srcs:[], muted:false, num:tracks.length+1 };
  tracks.push(t);
  renderTrack(t);
  return t;
}

// Schedule a track to loop in sync with the global clock.
// All tracks share the same loopStart reference point.
function scheduleTrack(t) {
  stopSrcs(t);
  if (t.muted) return;
  const now     = ctx.currentTime;
  const elapsed = (now - loopStart) % loopDur;
  playLoop(t, now, elapsed % t.buf.duration);
}

function scheduleAll() {
  tracks.forEach(scheduleTrack);
}

// Schedule one playback iteration; on ended, schedule the next.
// Tiny cross-fade (5ms) at boundaries eliminates clicks.
function playLoop(t, when, offset) {
  const src = ctx.createBufferSource();
  src.buffer = t.buf;

  // Cross-fade gain node per-source to avoid click at loop point
  const fadeGain = ctx.createGain();
  fadeGain.connect(t.gain);
  src.connect(fadeGain);

  const dur  = t.buf.duration;
  const rem  = dur - offset;
  const fade = 0.004; // 4ms

  fadeGain.gain.setValueAtTime(0, when);
  fadeGain.gain.linearRampToValueAtTime(1, when + fade);
  fadeGain.gain.setValueAtTime(1, when + rem - fade);
  fadeGain.gain.linearRampToValueAtTime(0, when + rem);

  src.start(when, offset);
  src.onended = () => {
    if (!tracks.find(x => x.id === t.id) || t.muted) return;
    playLoop(t, when + rem, 0);
  };
  t.srcs.push(src);
}

function stopSrcs(t) {
  t.srcs.forEach(s => { try { s.onended=null; s.stop(); } catch(e){} });
  t.srcs = [];
}

function muteTrack(id) {
  const t = tracks.find(x => x.id===id); if(!t) return;
  t.muted = !t.muted;
  if (t.muted) {
    t.gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.02);
    setTimeout(() => stopSrcs(t), 30);
  } else {
    t.gain.gain.setValueAtTime(1, ctx.currentTime);
    scheduleTrack(t);
  }
  const el = document.querySelector(`[data-id="${id}"]`);
  if (el) {
    el.classList.toggle('muted', t.muted);
    const btn = el.querySelector('.mute-btn');
    if (btn) { btn.textContent = t.muted ? 'unmute' : 'mute'; btn.classList.toggle('active', t.muted); }
  }
}

function delTrack(id) {
  const t = tracks.find(x => x.id===id); if(!t) return;
  stopSrcs(t); t.gain.disconnect();
  tracks = tracks.filter(x => x.id!==id);
  document.querySelector(`[data-id="${id}"]`)?.remove();
  tracks.forEach((x,i)=>{ x.num=i+1; const n=document.querySelector(`[data-id="${x.id}"] .tnum`); if(n) n.textContent=String(x.num).padStart(2,'0'); });
  ui();
}

function undo() {
  if (!tracks.length) return;
  delTrack(tracks[tracks.length-1].id);
  if (!tracks.length) clearAll();
}

function clearAll() {
  tracks.forEach(t => { stopSrcs(t); t.gain.disconnect(); });
  tracks = []; loopDur = 0; loopStart = 0;
  cancelAnimationFrame(raf);
  trackList.innerHTML = ''; trackList.appendChild(emptyMsg);
  rfg.style.strokeDashoffset = CIRC;
  rfg.classList.remove('rec','waiting');
  rtime.textContent = '--'; rlbl.textContent = 'no loop';
  recState = REC_STATE.IDLE;
  ui();
}

// ── RENDER TRACK ──────────────────────────────────
function renderTrack(t) {
  if (emptyMsg.parentNode) emptyMsg.remove();
  const el = document.createElement('div');
  el.className = 'track';
  el.dataset.id = t.id;
  el.innerHTML = `
    <div class="tnum">${String(t.num).padStart(2,'0')}</div>
    <div class="tbar"><canvas></canvas><div class="tph"></div></div>
    <button class="tbtn mute-btn">mute</button>
    <button class="tbtn del-btn">del</button>`;

  // Draw waveform
  const cv = el.querySelector('canvas');
  const W=200, H=22;
  cv.width = W * devicePixelRatio; cv.height = H * devicePixelRatio;
  cv.style.width = W+'px'; cv.style.height = H+'px';
  const c = cv.getContext('2d'); c.scale(devicePixelRatio, devicePixelRatio);
  const d = t.buf.getChannelData(0);
  const step = Math.max(1, Math.floor(d.length / W));
  const mid  = H / 2;
  c.strokeStyle = 'rgba(60,220,120,.6)'; c.lineWidth = 1; c.beginPath();
  for (let x=0;x<W;x++) {
    let mn=1, mx=-1;
    for (let j=0;j<step;j++) { const v=d[x*step+j]||0; if(v<mn)mn=v; if(v>mx)mx=v; }
    c.moveTo(x, mid+mn*mid*.8); c.lineTo(x, mid+mx*mid*.8);
  }
  c.stroke();

  el.querySelector('.mute-btn').onclick = () => muteTrack(t.id);
  el.querySelector('.del-btn').onclick  = () => delTrack(t.id);
  trackList.appendChild(el);
  el.animate([{opacity:0,transform:'translateY(6px)'},{opacity:1,transform:'translateY(0)'}],{duration:200,fill:'forwards'});
}

// ── ANIMATION ─────────────────────────────────────
function startAnim() { cancelAnimationFrame(raf); animFrame(); }
function animFrame() {
  if (!ctx || !loopDur) return;
  const el   = (ctx.currentTime - loopStart) % loopDur;
  const prog = el / loopDur;
  rfg.style.strokeDashoffset = CIRC * (1 - prog);
  rtime.textContent = (loopDur - el).toFixed(1) + 's';
  document.querySelectorAll('.tph').forEach(ph => ph.style.left = (prog*100)+'%');
  raf = requestAnimationFrame(animFrame);
}

// ── UI ────────────────────────────────────────────
function setStatus(t) { statusEl.textContent = t; }

function ui() {
  const isIdle = recState === REC_STATE.IDLE;
  const isArmedFirst = recState === REC_STATE.ARMED_FIRST;
  const isRecFirst   = recState === REC_STATE.RECORDING_FIRST;
  const isArmedLayer = recState === REC_STATE.ARMED_LAYER;
  const isRecLayer   = recState === REC_STATE.RECORDING_LAYER;
  const isRecording  = isRecFirst || isRecLayer;
  const isArmed      = isArmedFirst || isArmedLayer;
  const hasLoop      = loopDur > 0;

  btnRec.disabled    = !isIdle || isArmed || isRecording;
  btnLayer.disabled  = !isIdle || !hasLoop;
  btnStop.disabled   = isIdle && !isArmed;
  btnUndo.disabled   = !tracks.length || !isIdle;
  btnClear.disabled  = !tracks.length || !isIdle;

  btnRec.className   = isArmedFirst ? 'armed' : isRecFirst ? 'recording' : '';
  btnLayer.className = isArmedLayer ? 'armed' : isRecLayer ? 'recording' : '';

  rfg.classList.toggle('rec',     isRecording);
  rfg.classList.toggle('waiting', isArmed);

  if (isArmedFirst || isRecFirst) { setStatus(isArmedFirst ? 'ready — recording started' : 'recording first loop…'); }
  else if (isArmedLayer)  { setStatus('armed — waiting for loop boundary…'); }
  else if (isRecLayer)    { setStatus('recording layer…'); }
  else if (hasLoop)       { setStatus(`playing · ${tracks.length} layer${tracks.length!==1?'s':''}` ); rlbl.textContent = loopDur.toFixed(2)+'s loop'; }
  else                    { setStatus('ready'); }
}

// ── BUTTON WIRING ─────────────────────────────────
btnRec.onclick   = armFirst;
btnLayer.onclick = armLayer;
btnStop.onclick  = stopRecording;
btnUndo.onclick  = undo;
btnClear.onclick = clearAll;

// Init UI
ui();
</script>

</body>
</html>
