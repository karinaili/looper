<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOOPER</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#111;color:#e0e0e0;font-family:'SF Mono','Fira Code',monospace;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;padding:32px 20px 48px;gap:20px}

.logo{font-size:11px;letter-spacing:.45em;color:#444;align-self:flex-start}

/* STATUS */
#status{
width:100%;max-width:360px;
padding:11px 16px;border-radius:6px;
border:1px solid #222;background:#161616;
font-size:11px;letter-spacing:.07em;color:#555;text-transform:uppercase;
text-align:center;min-height:42px;
display:flex;align-items:center;justify-content:center;
transition:color .25s,border-color .25s;line-height:1.5;
}
#status.rec  {color:#e8453c;border-color:#e8453c55}
#status.play {color:#3cdc78;border-color:#3cdc7855}

/* PROGRESS */
.prog-wrap{width:100%;max-width:360px}
.prog-bg{height:5px;background:#1a1a1a;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;width:0%;border-radius:3px;background:#1a3d28;transition:none}
.prog-fill.rec{background:#5a1010}
.prog-time{font-size:10px;letter-spacing:.06em;color:#333;text-align:right;padding-top:4px;font-variant-numeric:tabular-nums}

/* BUTTONS */
.btn-row{display:flex;gap:10px;width:100%;max-width:360px}
.btn{
flex:1;padding:16px 10px;border-radius:6px;
border:1px solid #252525;background:#161616;
color:#666;font-family:inherit;font-size:9px;letter-spacing:.12em;text-transform:uppercase;
cursor:pointer;transition:all .15s;
display:flex;flex-direction:column;align-items:center;gap:7px;
outline:none;-webkit-tap-highlight-color:transparent;
}
.btn .ic{font-size:24px;line-height:1;transition:color .15s}
.btn:hover:not([disabled]){background:#1c1c1c;border-color:#333}
.btn:active:not([disabled]){transform:scale(.95)}
.btn[disabled]{opacity:.18;cursor:not-allowed}

/* REC */
#bRec .ic{color:#e8453c}
#bRec{border-color:#e8453c2a}
#bRec:hover:not([disabled]){border-color:#e8453c77;background:#180e0e}
#bRec.on{background:#1e0d0d;border-color:#e8453c;animation:pr 1s ease-in-out infinite alternate}
@keyframes pr{from{box-shadow:0 0 0 0 rgba(232,69,60,.5)}to{box-shadow:0 0 0 16px rgba(232,69,60,0)}}

/* LAYER */
#bLayer .ic{color:#ff8c42}
#bLayer{border-color:#ff8c422a}
#bLayer:hover:not([disabled]){border-color:#ff8c4277;background:#18120a}
#bLayer.on{background:#1e130a;border-color:#ff8c42;animation:po 1s ease-in-out infinite alternate}
@keyframes po{from{box-shadow:0 0 0 0 rgba(255,140,66,.5)}to{box-shadow:0 0 0 14px rgba(255,140,66,0)}}

/* STOP */
#bStop .ic{color:#bbb}
#bStop:hover:not([disabled]){border-color:#777;background:#1c1c1c;color:#fff}
#bStop.on{border-color:#ccc;color:#fff;background:#1e1e1e}

/* CLEAR */
#bClear .ic{color:#555}
#bClear:hover:not([disabled]){border-color:#555;background:#1a1a1a}

/* TRACKS */
#tracks{width:100%;max-width:360px;display:flex;flex-direction:column;gap:7px}
.empty{font-size:10px;letter-spacing:.1em;color:#222;text-transform:uppercase;text-align:center;padding:14px 0}
.track{display:flex;align-items:center;gap:8px;padding:9px 10px;background:#141414;border:1px solid #1e1e1e;border-radius:5px;transition:opacity .25s}
.track.muted{opacity:.2}
.tnum{font-size:10px;color:#2a2a2a;min-width:20px;text-align:right;flex-shrink:0}
.twav{flex:1;height:24px;background:#0c0c0c;border-radius:2px;position:relative;overflow:hidden;min-width:0}
.twav canvas{display:block;position:absolute;inset:0}
.tph{position:absolute;top:0;bottom:0;width:2px;background:#3cdc78;opacity:.6;pointer-events:none;transition:none}
.track.muted .tph{display:none}
.tbtns{display:flex;gap:5px;flex-shrink:0}
.tbtn{padding:3px 8px;border:1px solid #1e1e1e;border-radius:3px;background:transparent;color:#2a2a2a;font-family:inherit;font-size:9px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .1s}
.tbtn:hover{border-color:#333;color:#888}
.tbtn.mut{color:#c0392b;border-color:#c0392b44}
</style>

</head>
<body>

<div class="logo">LOOPER</div>

<div id="status">press REC to record first loop</div>

<div class="prog-wrap">
  <div class="prog-bg"><div class="prog-fill" id="pf"></div></div>
  <div class="prog-time" id="pt">--</div>
</div>

<!-- 4 buttons: REC · LAYER · STOP · CLEAR -->

<div class="btn-row">
  <button class="btn" id="bRec">
    <div class="ic">⏺</div>
    <div>rec</div>
  </button>
  <button class="btn" id="bLayer" disabled>
    <div class="ic">＋</div>
    <div id="bLayerLbl">layer</div>
  </button>
  <button class="btn" id="bStop" disabled>
    <div class="ic">⏹</div>
    <div>stop</div>
  </button>
  <button class="btn" id="bClear" disabled>
    <div class="ic">↺</div>
    <div>clear</div>
  </button>
</div>

<div id="tracks"><div class="empty" id="emp">no layers yet</div></div>

<script>
// ══════════════════════════════════════════════════════════
//  LOOPER
//  - First recording sets loop length
//  - All subsequent layers trimmed/padded to match
//  - Raw PCM via ScriptProcessor (no MediaRecorder latency)
//  - State: idle → rec-first → playing → rec-layer → playing
// ══════════════════════════════════════════════════════════

var ctx = null, micSrc = null, spNode = null;
var loopDur = 0, loopStart = 0, hasLoop = false;
var tracks = [], raf = null;
// 'idle' | 'rec-first' | 'playing' | 'rec-layer'
var state = 'idle';
var recBuf = [];

// ── INIT MIC ──────────────────────────────────────────────
async function initAudio() {
  if (ctx) { await ctx.resume(); return true; }
  try {
    ctx = new (window.AudioContext || window.webkitAudioContext)({
      sampleRate: 44100, latencyHint: 'interactive'
    });
  } catch(e) { setStatus('web audio not supported', ''); return false; }
  try {
    var stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
    });
    micSrc = ctx.createMediaStreamSource(stream);
  } catch(e) {
    setStatus('mic denied — open over https:// and allow mic access', '');
    return false;
  }
  // ScriptProcessor: zero-latency PCM capture
  spNode = ctx.createScriptProcessor(256, 1, 1);
  spNode.onaudioprocess = function(e) {
    if (state === 'rec-first' || state === 'rec-layer') {
      recBuf.push(new Float32Array(e.inputBuffer.getChannelData(0)));
    }
  };
  var sil = ctx.createGain(); sil.gain.value = 0;
  micSrc.connect(spNode); spNode.connect(sil); sil.connect(ctx.destination);
  await ctx.resume();
  return true;
}

// ── REC (first loop) ──────────────────────────────────────
async function onRec() {
  if (state !== 'idle') return;
  if (!(await initAudio())) return;
  recBuf = [];
  state = 'rec-first';
  ui(); setStatus('recording… press STOP when done', 'rec');
}

// ── LAYER ─────────────────────────────────────────────────
async function onLayer() {
  if (state !== 'playing') return;
  if (!(await initAudio())) return;
  recBuf = [];
  state = 'rec-layer';
  ui(); setStatus('recording layer… press STOP when done', 'rec');
}

// ── STOP ──────────────────────────────────────────────────
function onStop() {
  if (state === 'rec-first') {
    finishFirst();
  } else if (state === 'rec-layer') {
    finishLayer();
  }
}

function finishFirst() {
  state = 'playing';
  var raw = buildBuf(recBuf);
  if (!raw || raw.length < 1000) {
    // Too short — ignore
    state = 'idle'; ui();
    setStatus('recording too short — try again', '');
    return;
  }
  loopDur = raw.duration;
  loopStart = ctx.currentTime;
  hasLoop = true;
  addTrack(raw);
  scheduleAll();
  startAnim();
  ui(); setStatus('playing · 1 layer · ' + loopDur.toFixed(2) + 's — press LAYER to overdub', 'play');
}

function finishLayer() {
  state = 'playing';
  if (!recBuf.length) { ui(); return; }
  var raw = buildBuf(recBuf);
  if (!raw) { ui(); return; }

  // Trim or pad to exactly loopDur seconds
  var sr = ctx.sampleRate;
  var n  = Math.round(loopDur * sr);
  var fitted = ctx.createBuffer(1, n, sr);
  var src = raw.getChannelData(0), dst = fitted.getChannelData(0);

  if (raw.length >= n) {
    // Trim: take first n samples (recording started at correct point)
    dst.set(src.subarray(0, n));
  } else {
    // Pad with silence (recording was shorter than loop)
    dst.set(src.subarray(0, raw.length));
  }

  addTrack(fitted);
  scheduleTrack(tracks[tracks.length - 1]);
  ui(); setStatus('playing · ' + tracks.length + ' layers', 'play');
}

// ── CLEAR ─────────────────────────────────────────────────
function onClear() {
  tracks.forEach(function(t) { stopSrcs(t); t.gain.disconnect(); });
  tracks = [];
  hasLoop = false; loopDur = 0;
  state = 'idle';
  cancelAnimationFrame(raf); raf = null;
  var tEl = document.getElementById('tracks');
  tEl.innerHTML = '';
  var em = document.createElement('div');
  em.className = 'empty'; em.id = 'emp'; em.textContent = 'no layers yet';
  tEl.appendChild(em);
  document.getElementById('pf').style.width = '0%';
  document.getElementById('pt').textContent = '--';
  ui(); setStatus('press REC to record first loop', '');
}

// ── BUFFER HELPERS ────────────────────────────────────────
function buildBuf(chunks) {
  if (!chunks.length) return null;
  var total = chunks.reduce(function(s, c) { return s + c.length; }, 0);
  var buf = ctx.createBuffer(1, total, ctx.sampleRate);
  var dst = buf.getChannelData(0);
  var off = 0;
  chunks.forEach(function(c) { dst.set(c, off); off += c.length; });
  return buf;
}

// ── SCHEDULING ────────────────────────────────────────────
function addTrack(buf) {
  var gain = ctx.createGain();
  gain.connect(ctx.destination);
  var t = { id: Date.now(), buf: buf, gain: gain, srcs: [], muted: false, num: tracks.length + 1 };
  tracks.push(t);
  renderTrack(t);
  return t;
}

function scheduleTrack(t) {
  stopSrcs(t);
  if (t.muted) return;
  var now = ctx.currentTime;
  // Sync to loop position
  var elapsed = (now - loopStart) % loopDur;
  var offset  = elapsed % t.buf.duration;
  playLoop(t, now, offset);
}

function scheduleAll() { tracks.forEach(scheduleTrack); }

function playLoop(t, when, offset) {
  var src = ctx.createBufferSource();
  src.buffer = t.buf;
  var fg = ctx.createGain();
  src.connect(fg); fg.connect(t.gain);

  var rem  = t.buf.duration - offset;
  var fade = 0.004; // 4ms crossfade to remove clicks
  fg.gain.setValueAtTime(0, when);
  fg.gain.linearRampToValueAtTime(1, when + fade);
  fg.gain.setValueAtTime(1, when + rem - fade);
  fg.gain.linearRampToValueAtTime(0, when + rem);

  src.start(when, offset);
  src.onended = function() {
    if (!tracks.find(function(x) { return x.id === t.id; }) || t.muted) return;
    playLoop(t, when + rem, 0);
  };
  t.srcs.push(src);
}

function stopSrcs(t) {
  t.srcs.forEach(function(s) {
    try { s.onended = null; s.stop(); } catch(e) {}
  });
  t.srcs = [];
}

function muteTrack(id) {
  var t = tracks.find(function(x) { return x.id === id; });
  if (!t) return;
  t.muted = !t.muted;
  if (t.muted) {
    t.gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.02);
    setTimeout(function() { stopSrcs(t); }, 30);
  } else {
    t.gain.gain.setValueAtTime(1, ctx.currentTime);
    scheduleTrack(t);
  }
  var el = document.querySelector('[data-id="' + id + '"]');
  if (el) {
    el.classList.toggle('muted', t.muted);
    var btn = el.querySelector('.mbtn');
    if (btn) { btn.textContent = t.muted ? 'unmute' : 'mute'; btn.classList.toggle('mut', t.muted); }
  }
}

function delTrack(id) {
  var t = tracks.find(function(x) { return x.id === id; });
  if (!t) return;
  stopSrcs(t); t.gain.disconnect();
  tracks = tracks.filter(function(x) { return x.id !== id; });
  var el = document.querySelector('[data-id="' + id + '"]');
  if (el) el.remove();
  tracks.forEach(function(x, i) {
    x.num = i + 1;
    var n = document.querySelector('[data-id="' + x.id + '"] .tnum');
    if (n) n.textContent = String(x.num).padStart(2, '0');
  });
  if (!tracks.length) {
    onClear();
  } else {
    ui();
    setStatus('playing · ' + tracks.length + ' layers', 'play');
  }
}

// ── TRACK DOM ─────────────────────────────────────────────
function renderTrack(t) {
  var em = document.getElementById('emp');
  if (em) em.remove();

  var el = document.createElement('div');
  el.className = 'track'; el.dataset.id = t.id;
  el.innerHTML =
    '<div class="tnum">' + String(t.num).padStart(2,'0') + '</div>' +
    '<div class="twav"><canvas></canvas><div class="tph"></div></div>' +
    '<div class="tbtns">' +
    '<button class="tbtn mbtn">mute</button>' +
    '<button class="tbtn dbtn">del</button>' +
    '</div>';

  // Draw waveform
  var cv = el.querySelector('canvas');
  var W = 200, H = 24;
  cv.width = W * devicePixelRatio; cv.height = H * devicePixelRatio;
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  var c = cv.getContext('2d');
  c.scale(devicePixelRatio, devicePixelRatio);
  var d = t.buf.getChannelData(0);
  var step = Math.max(1, Math.floor(d.length / W));
  var mid = H / 2;
  c.strokeStyle = 'rgba(60,220,120,.5)'; c.lineWidth = 1; c.beginPath();
  for (var x = 0; x < W; x++) {
    var mn = 1, mx = -1;
    for (var j = 0; j < step; j++) {
      var v = d[x * step + j] || 0;
      if (v < mn) mn = v; if (v > mx) mx = v;
    }
    c.moveTo(x, mid + mn * mid * .82); c.lineTo(x, mid + mx * mid * .82);
  }
  c.stroke();

  el.querySelector('.mbtn').onclick = function() { muteTrack(t.id); };
  el.querySelector('.dbtn').onclick = function() { delTrack(t.id); };
  document.getElementById('tracks').appendChild(el);
  el.animate(
    [{ opacity: 0, transform: 'translateY(5px)' }, { opacity: 1, transform: 'none' }],
    { duration: 180, fill: 'forwards' }
  );
}

// ── ANIMATION ─────────────────────────────────────────────
function startAnim() { cancelAnimationFrame(raf); animFrame(); }
function animFrame() {
  if (ctx && hasLoop) {
    var elapsed = (ctx.currentTime - loopStart) % loopDur;
    var prog    = elapsed / loopDur;
    document.getElementById('pf').style.width = (prog * 100) + '%';
    document.getElementById('pt').textContent = (loopDur - elapsed).toFixed(2) + 's';
    document.querySelectorAll('.tph').forEach(function(p) {
      p.style.left = (prog * 100) + '%';
    });
  }
  raf = requestAnimationFrame(animFrame);
}

// ── UI STATE ──────────────────────────────────────────────
function setStatus(txt, cls) {
  var el = document.getElementById('status');
  el.textContent = txt; el.className = cls || '';
}

function ui() {
  var idle = state === 'idle';
  var recF = state === 'rec-first';
  var play = state === 'playing';
  var recL = state === 'rec-layer';

  var bRec   = document.getElementById('bRec');
  var bLayer = document.getElementById('bLayer');
  var bStop  = document.getElementById('bStop');
  var bClear = document.getElementById('bClear');

  // REC: only when idle
  bRec.disabled = !idle;
  bRec.className = 'btn' + (recF ? ' on' : '');

  // LAYER: only when playing
  bLayer.disabled = !play;
  bLayer.className = 'btn' + (recL ? ' on' : '');
  document.getElementById('bLayerLbl').textContent = recL ? 'recording…' : 'layer';

  // STOP: when recording anything
  bStop.disabled = !(recF || recL);
  bStop.className = 'btn' + (recF || recL ? ' on' : '');

  // CLEAR: when there's content and not recording
  bClear.disabled = !hasLoop || recF || recL;

  // Progress bar color
  document.getElementById('pf').classList.toggle('rec', recF || recL);
}

// ── WIRE BUTTONS ──────────────────────────────────────────
document.getElementById('bRec').onclick   = onRec;
document.getElementById('bLayer').onclick = onLayer;
document.getElementById('bStop').onclick  = onStop;
document.getElementById('bClear').onclick = onClear;

// ── BOOT ──────────────────────────────────────────────────
startAnim();
ui();
</script>

</body>
</html>
