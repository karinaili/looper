<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOOPER</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0f0f0f;color:#ddd;font-family:'SF Mono','Fira Code',monospace;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:28px 20px 40px;gap:20px;min-height:100vh}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:400px}
.logo{font-size:13px;letter-spacing:.4em;color:#555;font-weight:600}
.bpm-row{display:flex;align-items:center;gap:6px}
.bpm-val{font-size:20px;font-weight:700;min-width:38px;text-align:center}
.bpm-lbl{font-size:9px;letter-spacing:.1em;color:#444;text-transform:uppercase}
.arrow{width:26px;height:26px;border:1px solid #252525;border-radius:4px;background:#161616;color:#666;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s}
.arrow:hover{border-color:#444;color:#ddd}

/* MSG */
#msg{font-size:11px;letter-spacing:.1em;color:#555;text-transform:uppercase;text-align:center;min-height:14px}

/* MAIN REC BUTTON */
.rec-wrap{position:relative;display:flex;align-items:center;justify-content:center}
#btnRec{
width:110px;height:110px;border-radius:50%;
border:2px solid #252525;background:#161616;
cursor:pointer;transition:all .15s;
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
outline:none;
}
#btnRec .icon{font-size:28px;color:#e8453c;transition:all .15s}
#btnRec .lbl{font-size:9px;letter-spacing:.12em;color:#555;text-transform:uppercase}
#btnRec:hover{border-color:#333;background:#1a1a1a}
#btnRec.recording{border-color:#e8453c;background:#1a0f0f;animation:glow-red 1s ease-in-out infinite alternate}
#btnRec.recording .icon{color:#e8453c}
#btnRec.recording .lbl{color:#e8453c99}
#btnRec.armed{border-color:#ff8c42;background:#1a140e;animation:glow-org .7s ease-in-out infinite alternate}
#btnRec.armed .icon{color:#ff8c42;font-size:20px}
#btnRec.armed .lbl{color:#ff8c4299}
@keyframes glow-red{from{box-shadow:0 0 0 0 rgba(232,69,60,.3)}to{box-shadow:0 0 0 16px rgba(232,69,60,0)}}
@keyframes glow-org{from{box-shadow:0 0 0 0 rgba(255,140,66,.3)}to{box-shadow:0 0 0 12px rgba(255,140,66,0)}}

/* PROGRESS BAR */
.prog-wrap{width:100%;max-width:400px}
.prog-bg{height:6px;background:#1a1a1a;border-radius:3px;overflow:hidden}
.prog-fg{height:100%;width:0%;background:#2a6e4a;border-radius:3px;transition:none}
.prog-fg.rec{background:#e8453c}
.beat-marks{display:flex;justify-content:space-between;padding:3px 0 0;opacity:.3}
.beat-dot{width:4px;height:4px;border-radius:50%;background:#333}
.beat-dot.bar-start{background:#555}

/* BARS selector */
.bars-row{display:flex;align-items:center;gap:10px}
.bars-lbl{font-size:9px;letter-spacing:.1em;color:#444;text-transform:uppercase}
.bar-btn{padding:5px 10px;border:1px solid #252525;border-radius:3px;background:#161616;color:#555;font-family:inherit;font-size:10px;letter-spacing:.06em;cursor:pointer;transition:all .1s}
.bar-btn:hover{border-color:#333;color:#888}
.bar-btn.active{border-color:#2a6e4a;color:#3cdc78;background:#0d1f17}

/* LAYER BUTTON */
#btnLayer{
padding:14px 32px;border:1px solid #ff8c4233;border-radius:6px;
background:#161616;color:#ff8c42;font-family:inherit;font-size:11px;
letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .15s;
}
#btnLayer:hover:not(:disabled){border-color:#ff8c42;background:#1a140e}
#btnLayer:disabled{opacity:.2;cursor:not-allowed}
#btnLayer.armed{border-color:#ff8c42;background:#1a140e;animation:glow-org .7s ease-in-out infinite alternate}
#btnLayer.recording{border-color:#ff8c42;background:#1a140e;animation:glow-org 1s ease-in-out infinite alternate}

/* TRACKS */
#tracks{width:100%;max-width:400px;display:flex;flex-direction:column;gap:6px}
.track{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#141414;border:1px solid #1e1e1e;border-radius:4px;transition:opacity .2s}
.track.muted{opacity:.25}
.tnum{font-size:10px;color:#333;min-width:20px;text-align:right}
.twav{flex:1;height:24px;background:#0a0a0a;border-radius:2px;position:relative;overflow:hidden}
.twav canvas{display:block;position:absolute;inset:0}
.tph{position:absolute;top:0;bottom:0;width:2px;background:#3cdc78;opacity:.5;pointer-events:none}
.track.muted .tph{display:none}
.tbtn{padding:3px 8px;border:1px solid #1e1e1e;border-radius:3px;background:transparent;color:#333;font-family:inherit;font-size:9px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .1s}
.tbtn:hover{border-color:#333;color:#888}
.tbtn.on{color:#e8453c;border-color:#e8453c33}

/* BOTTOM ROW */
.bottom-row{display:flex;gap:8px;width:100%;max-width:400px}
.util-btn{flex:1;padding:8px;border:1px solid #1e1e1e;border-radius:4px;background:#141414;color:#333;font-family:inherit;font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .1s}
.util-btn:hover:not(:disabled){border-color:#333;color:#777}
.util-btn:disabled{opacity:.15;cursor:not-allowed}
</style>

</head>
<body>

<div class="header">
  <div class="logo">LOOPER</div>
  <div class="bpm-row">
    <button class="arrow" id="bpmDn">−</button>
    <div>
      <div class="bpm-val" id="bpmVal">120</div>
      <div class="bpm-lbl">bpm</div>
    </div>
    <button class="arrow" id="bpmUp">+</button>
  </div>
</div>

<div id="msg">press rec to start</div>

<!-- Big record button -->

<button id="btnRec">
  <div class="icon">⏺</div>
  <div class="lbl">rec</div>
</button>

<!-- Progress bar + beat marks -->

<div class="prog-wrap">
  <div class="prog-bg"><div class="prog-fg" id="progFg"></div></div>
  <div class="beat-marks" id="beatMarks"></div>
</div>

<!-- Bars selector -->

<div class="bars-row">
  <div class="bars-lbl">bars:</div>
  <button class="bar-btn active" data-bars="1">1</button>
  <button class="bar-btn" data-bars="2">2</button>
  <button class="bar-btn" data-bars="4">4</button>
  <button class="bar-btn" data-bars="8">8</button>
</div>

<!-- Layer button -->

<button id="btnLayer" disabled>+ add layer</button>

<!-- Tracks -->

<div id="tracks"></div>

<!-- Undo / Clear -->

<div class="bottom-row">
  <button class="util-btn" id="btnUndo" disabled>↩ undo</button>
  <button class="util-btn" id="btnClear" disabled>✕ clear all</button>
</div>

<script>
// ════════════════════════════════════
//  STATE
// ════════════════════════════════════
let BPM  = 120;
let BARS = 1;
const BEATS_PER_BAR = 4;

function barDuration()  { return 60 / BPM; }          // one bar in seconds
function loopDuration() { return BARS * barDuration(); }

let ctx = null, micSrc = null, spNode = null;
let loopStart = 0, hasLoop = false;
let tracks = [], raf = null;

// Recording state: 'idle' | 'rec-first' | 'armed-layer' | 'rec-layer'
let recState = 'idle';
let recBuf   = [];   // Float32Array chunks
let recStart = 0;    // audioCtx.currentTime when rec actually started

// ════════════════════════════════════
//  AUDIO INIT
// ════════════════════════════════════
async function initAudio() {
  if (ctx) { await ctx.resume(); return true; }
  try {
    ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate:44100, latencyHint:'interactive' });
  } catch(e) { showMsg('web audio not supported'); return false; }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio:{ echoCancellation:false, noiseSuppression:false, autoGainControl:false }
    });
    micSrc = ctx.createMediaStreamSource(stream);
  } catch(e) { showMsg('mic denied — need https + mic permission'); return false; }

  // ScriptProcessor records raw PCM — no encode/decode latency
  spNode = ctx.createScriptProcessor(256, 1, 1);
  spNode.onaudioprocess = e => {
    if (recState === 'rec-first' || recState === 'rec-layer') {
      recBuf.push(new Float32Array(e.inputBuffer.getChannelData(0)));
    }
  };
  // Connect mic → script → silent output
  const silent = ctx.createGain(); silent.gain.value = 0;
  micSrc.connect(spNode); spNode.connect(silent); silent.connect(ctx.destination);
  await ctx.resume();
  return true;
}

// ════════════════════════════════════
//  RECORD FIRST LOOP
// ════════════════════════════════════
async function recFirst() {
  if (!(await initAudio())) return;
  recBuf = []; recStart = ctx.currentTime;
  recState = 'rec-first';
  updateUI(); showMsg('recording… press ⏺ to stop');
}

function stopFirst() {
  recState = 'idle';
  const raw = buildBuf(recBuf);
  if (!raw) { updateUI(); return; }
  // Fit to loop duration
  const looped = fitBuf(raw, loopDuration());
  loopStart = ctx.currentTime;
  hasLoop = true;
  addTrack(looped);
  scheduleAll();
  startAnim();
  updateUI();
}

// ════════════════════════════════════
//  ADD LAYER  (quantized to bar boundary)
// ════════════════════════════════════
function armLayer() {
  if (!hasLoop) return;
  recState = 'armed-layer';
  recBuf = [];
  updateUI(); showMsg('armed — starts at next bar…');

  const now     = ctx.currentTime;
  const elapsed = (now - loopStart) % loopDuration();
  const toNext  = loopDuration() - elapsed; // ms to next loop boundary

  // Start recording at next boundary (we start slightly early to not miss samples)
  const startIn = Math.max(0, toNext - 0.05); // 50ms early
  setTimeout(() => {
    recStart = ctx.currentTime + 0.05;
    recState = 'rec-layer';
    updateUI(); showMsg('recording layer…');
  }, startIn * 1000);

  // Auto-stop after one full loop
  setTimeout(() => {
    if (recState === 'rec-layer') stopLayer();
  }, (toNext + loopDuration()) * 1000);
}

function stopLayer() {
  recState = 'idle';
  const raw = buildBuf(recBuf);
  if (!raw) { updateUI(); return; }

  // Take the last loopDuration() seconds of the captured buffer
  // (discards the pre-roll we started early)
  const sr          = ctx.sampleRate;
  const loopSamples = Math.round(loopDuration() * sr);
  const from        = Math.max(0, raw.length - loopSamples);
  const trimmed     = ctx.createBuffer(1, loopSamples, sr);
  const src         = raw.getChannelData(0);
  const dst         = trimmed.getChannelData(0);
  dst.set(src.subarray(from, from + loopSamples));

  addTrack(trimmed);
  scheduleTrack(tracks[tracks.length-1]);
  updateUI();
}

// ════════════════════════════════════
//  BUFFER HELPERS
// ════════════════════════════════════
function buildBuf(chunks) {
  if (!chunks.length) return null;
  const total = chunks.reduce((s,c)=>s+c.length, 0);
  const buf = ctx.createBuffer(1, total, ctx.sampleRate);
  const dst = buf.getChannelData(0);
  let off=0; chunks.forEach(c=>{dst.set(c,off);off+=c.length;});
  return buf;
}

function fitBuf(buf, dur) {
  const n = Math.round(dur * ctx.sampleRate);
  const out = ctx.createBuffer(1, n, ctx.sampleRate);
  const src = buf.getChannelData(0), dst = out.getChannelData(0);
  dst.set(src.subarray(0, Math.min(src.length, n)));
  return out;
}

// ════════════════════════════════════
//  TRACK PLAYBACK
// ════════════════════════════════════
function addTrack(buf) {
  const gain = ctx.createGain(); gain.connect(ctx.destination);
  const t = { id:Date.now(), buf, gain, srcs:[], muted:false, num:tracks.length+1 };
  tracks.push(t); renderTrack(t); return t;
}

function scheduleTrack(t) {
  stopSrcs(t); if(t.muted) return;
  const now = ctx.currentTime;
  const pos = (now - loopStart) % loopDuration(); // position in cycle
  const off = pos % t.buf.duration;               // position in buffer
  playLoop(t, now, off);
}

function scheduleAll() { tracks.forEach(scheduleTrack); }

function playLoop(t, when, offset) {
  const src = ctx.createBufferSource();
  src.buffer = t.buf;
  const fg = ctx.createGain(); src.connect(fg); fg.connect(t.gain);
  const rem  = t.buf.duration - offset;
  const fade = 0.003;
  fg.gain.setValueAtTime(0, when);
  fg.gain.linearRampToValueAtTime(1, when + fade);
  fg.gain.setValueAtTime(1, when + rem - fade);
  fg.gain.linearRampToValueAtTime(0, when + rem);
  src.start(when, offset);
  src.onended = () => {
    if (!tracks.find(x=>x.id===t.id) || t.muted) return;
    playLoop(t, when + rem, 0);
  };
  t.srcs.push(src);
}

function stopSrcs(t) {
  t.srcs.forEach(s=>{try{s.onended=null;s.stop();}catch(e){}});
  t.srcs=[];
}

function muteTrack(id) {
  const t=tracks.find(x=>x.id===id); if(!t) return;
  t.muted=!t.muted;
  if(t.muted){t.gain.gain.linearRampToValueAtTime(0,ctx.currentTime+0.02);setTimeout(()=>stopSrcs(t),30);}
  else{t.gain.gain.setValueAtTime(1,ctx.currentTime);scheduleTrack(t);}
  const el=document.querySelector(`[data-id="${id}"]`);
  if(el){el.classList.toggle('muted',t.muted);const b=el.querySelector('.mute-btn');if(b){b.textContent=t.muted?'un':'mute';b.classList.toggle('on',t.muted);}}
}

function delTrack(id) {
  const t=tracks.find(x=>x.id===id); if(!t) return;
  stopSrcs(t); t.gain.disconnect(); tracks=tracks.filter(x=>x.id!==id);
  document.querySelector(`[data-id="${id}"]`)?.remove();
  tracks.forEach((x,i)=>{x.num=i+1;const n=document.querySelector(`[data-id="${x.id}"] .tnum`);if(n)n.textContent=String(x.num).padStart(2,'0');});
  updateUI();
}

function undo() {
  if(!tracks.length) return;
  delTrack(tracks[tracks.length-1].id);
  if(!tracks.length) clearAll();
  else updateUI();
}

function clearAll() {
  tracks.forEach(t=>{stopSrcs(t);t.gain.disconnect();}); tracks=[];
  hasLoop=false; recState='idle';
  cancelAnimationFrame(raf); raf=null;
  document.getElementById('tracks').innerHTML='';
  document.getElementById('progFg').style.width='0%';
  updateUI(); showMsg('press rec to start');
}

// ════════════════════════════════════
//  TRACK DOM
// ════════════════════════════════════
function renderTrack(t) {
  const el=document.createElement('div');
  el.className='track'; el.dataset.id=t.id;
  el.innerHTML=`<div class="tnum">${String(t.num).padStart(2,'0')}</div>
    <div class="twav"><canvas></canvas><div class="tph"></div></div>
    <button class="tbtn mute-btn">mute</button>
    <button class="tbtn del-btn">del</button>`;
  // waveform
  const cv=el.querySelector('canvas'),W=200,H=24;
  cv.width=W*devicePixelRatio; cv.height=H*devicePixelRatio;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  const c=cv.getContext('2d'); c.scale(devicePixelRatio,devicePixelRatio);
  const d=t.buf.getChannelData(0),step=Math.max(1,Math.floor(d.length/W)),mid=H/2;
  c.strokeStyle='rgba(60,220,120,.5)'; c.lineWidth=1; c.beginPath();
  for(let x=0;x<W;x++){
    let mn=1,mx=-1;
    for(let j=0;j<step;j++){const v=d[x*step+j]||0;if(v<mn)mn=v;if(v>mx)mx=v;}
    c.moveTo(x,mid+mn*mid*.8); c.lineTo(x,mid+mx*mid*.8);
  }
  c.stroke();
  el.querySelector('.mute-btn').onclick=()=>muteTrack(t.id);
  el.querySelector('.del-btn').onclick=()=>delTrack(t.id);
  document.getElementById('tracks').appendChild(el);
  el.animate([{opacity:0,transform:'translateY(4px)'},{opacity:1,transform:'translateY(0)'}],{duration:160,fill:'forwards'});
}

// ════════════════════════════════════
//  ANIMATION
// ════════════════════════════════════
function startAnim() { cancelAnimationFrame(raf); animFrame(); }
function animFrame() {
  if(!ctx||!hasLoop){raf=requestAnimationFrame(animFrame);return;}
  const elapsed=(ctx.currentTime-loopStart)%loopDuration();
  const prog=elapsed/loopDuration();
  document.getElementById('progFg').style.width=(prog*100)+'%';
  document.querySelectorAll('.tph').forEach(p=>p.style.left=(prog*100)+'%');
  raf=requestAnimationFrame(animFrame);
}

// beat marks under progress bar
function buildBeatMarks() {
  const c=document.getElementById('beatMarks'); c.innerHTML='';
  const total=BARS*BEATS_PER_BAR;
  for(let i=0;i<=total;i++){
    const d=document.createElement('div');
    d.className='beat-dot'+(i%BEATS_PER_BAR===0?' bar-start':'');
    c.appendChild(d);
  }
}

// ════════════════════════════════════
//  UI STATE
// ════════════════════════════════════
function showMsg(t){document.getElementById('msg').textContent=t;}

function updateUI() {
  const idle   = recState==='idle';
  const recF   = recState==='rec-first';
  const armed  = recState==='armed-layer';
  const recL   = recState==='rec-layer';

  // Big rec button
  const br=document.getElementById('btnRec');
  const icon=br.querySelector('.icon'), lbl=br.querySelector('.lbl');
  br.className=''; // reset
  if(recF){ br.classList.add('recording'); icon.textContent='⏹'; lbl.textContent='stop'; }
  else if(armed){ br.classList.add('armed'); icon.textContent='⏱'; lbl.textContent='wait…'; }
  else { icon.textContent='⏺'; lbl.textContent='rec'; }

  // Layer button
  const bl=document.getElementById('btnLayer');
  bl.disabled=(!hasLoop&&idle)||recF;
  bl.className=''; // reset
  if(armed||recL) bl.classList.add(armed?'armed':'recording');
  bl.textContent=(recL||armed)?'⏹ stop layer':'+ add layer';

  document.getElementById('btnUndo').disabled  = !tracks.length || !idle;
  document.getElementById('btnClear').disabled = !tracks.length || !idle;

  // progress bar color
  const pf=document.getElementById('progFg');
  pf.classList.toggle('rec', recF||recL);

  // BPM & bars buttons only when idle/playing
  document.getElementById('bpmUp').disabled = !idle||recF||armed||recL;
  document.getElementById('bpmDn').disabled = !idle||recF||armed||recL;
  document.querySelectorAll('.bar-btn').forEach(b=>b.disabled=hasLoop||recF);

  if(hasLoop&&idle) showMsg(`playing · ${tracks.length} layer${tracks.length!==1?'s':''} · ${loopDuration().toFixed(2)}s`);
}

// ════════════════════════════════════
//  BUTTON WIRING
// ════════════════════════════════════
document.getElementById('btnRec').onclick = async () => {
  if(ctx) ctx.resume();
  if(recState==='idle')       recFirst();
  else if(recState==='rec-first') stopFirst();
};

document.getElementById('btnLayer').onclick = () => {
  if(recState==='idle'&&hasLoop)       armLayer();
  else if(recState==='rec-layer'||recState==='armed-layer') stopLayer();
};

document.getElementById('btnUndo').onclick  = undo;
document.getElementById('btnClear').onclick = clearAll;

document.getElementById('bpmUp').onclick = ()=>{BPM=Math.min(240,BPM+1);document.getElementById('bpmVal').textContent=BPM;};
document.getElementById('bpmDn').onclick = ()=>{BPM=Math.max(40,BPM-1);document.getElementById('bpmVal').textContent=BPM;};

document.querySelectorAll('.bar-btn').forEach(b=>{
  b.onclick=()=>{
    if(hasLoop) return; // can't change after first loop
    BARS=parseInt(b.dataset.bars);
    document.querySelectorAll('.bar-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    buildBeatMarks();
  };
});

// ── INIT ──
buildBeatMarks();
startAnim(); // start animation loop so it's ready
updateUI();
</script>

</body>
</html>
