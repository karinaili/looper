<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOOPER</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0e0e0e;color:#e8e8e8;font-family:'SF Mono',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:24px;padding:24px}
h1{font-size:20px;letter-spacing:.3em;font-weight:700}
#status{font-size:12px;letter-spacing:.1em;color:#666;text-transform:uppercase;height:16px}
.controls{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
button{padding:14px 24px;border:1px solid #333;border-radius:6px;background:#161616;color:#e8e8e8;font-family:inherit;font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s;min-width:110px}
button:hover:not(:disabled){border-color:#555;background:#1e1e1e}
button:disabled{opacity:.3;cursor:not-allowed}
button:active:not(:disabled){transform:scale(.96)}
#btnRecord{border-color:rgba(232,69,60,.4);color:#e8453c}
#btnRecord:hover:not(:disabled){border-color:#e8453c;background:rgba(232,69,60,.1)}
#btnRecord.rec{animation:blink 1s infinite alternate;background:rgba(232,69,60,.15);border-color:#e8453c}
#btnLayer{border-color:rgba(255,140,66,.4);color:#ff8c42}
#btnLayer:hover:not(:disabled){border-color:#ff8c42;background:rgba(255,140,66,.1)}
#btnLayer.rec{animation:blink 1s infinite alternate;background:rgba(255,140,66,.15);border-color:#ff8c42}
@keyframes blink{from{opacity:1}to{opacity:.5}}
.ring-wrap{position:relative;width:160px;height:160px}
svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:#1e1e1e;stroke-width:6}
.ring-fg{fill:none;stroke:#3cdc78;stroke-width:6;stroke-linecap:round;stroke-dasharray:440;stroke-dashoffset:440;transition:stroke .3s}
.ring-fg.rec{stroke:#e8453c}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.ring-time{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums}
.ring-lbl{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#555}
#tracks{width:100%;max-width:420px;display:flex;flex-direction:column;gap:8px}
.track{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#161616;border:1px solid #2a2a2a;border-radius:6px}
.tnum{font-size:11px;color:#555;min-width:22px}
.tbar{flex:1;height:24px;background:#0e0e0e;border-radius:3px;position:relative;overflow:hidden}
.tbar canvas{width:100%;height:100%;display:block}
.tph{position:absolute;top:0;bottom:0;width:1px;background:#3cdc78;opacity:.7}
.tbtn{padding:4px 10px;border:1px solid #2a2a2a;border-radius:3px;background:transparent;color:#666;font-family:inherit;font-size:9px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .12s}
.tbtn:hover{border-color:#444;color:#e8e8e8}
.tbtn.muted{border-color:#e8453c;color:#e8453c}
.empty{font-size:11px;letter-spacing:.08em;color:#444;text-transform:uppercase;text-align:center;padding:20px}
</style>
</head>
<body>
<h1>LOOPER</h1>
<div id="status">ready</div>

<div class="ring-wrap">
  <svg viewBox="0 0 140 140">
    <circle class="ring-bg" cx="70" cy="70" r="60"/>
    <circle class="ring-fg" id="ringFg" cx="70" cy="70" r="60"/>
  </svg>
  <div class="ring-center">
    <div class="ring-time" id="ringTime">--</div>
    <div class="ring-lbl" id="ringLbl">no loop</div>
  </div>
</div>

<div class="controls">
  <button id="btnRecord">⏺ record</button>
  <button id="btnLayer" disabled>+ layer</button>
  <button id="btnStop" disabled>⏹ stop</button>
</div>
<div class="controls">
  <button id="btnUndo" disabled>↩ undo</button>
  <button id="btnClear" disabled>✕ clear</button>
</div>

<div id="tracks"><div class="empty" id="emptyMsg">no layers yet</div></div>

<script>
// ── constants
const CIRC = 2 * Math.PI * 60; // 376.99

// ── state
let ctx, stream, recorder, chunks=[], recType=null, recording=false;
let loopDur=0, loopStart=0;
let tracks=[], raf=null, autoStop=null;

// ── dom
const $ = id => document.getElementById(id);
const btnRec=$('btnRecord'), btnLay=$('btnLayer'), btnStp=$('btnStop');
const btnUnd=$('btnUndo'), btnClr=$('btnClear');
const status=$('status'), ringFg=$('ringFg');
const ringTime=$('ringTime'), ringLbl=$('ringLbl');
const trackList=$('tracks'), emptyMsg=$('emptyMsg');

ringFg.style.strokeDasharray=CIRC;
ringFg.style.strokeDashoffset=CIRC;

// ── audio init
async function init(){
  if(ctx) return true;
  try{ ctx=new(window.AudioContext||window.webkitAudioContext)(); }
  catch(e){ alert('Web Audio not supported'); return false; }
  try{ stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false}); }
  catch(e){ alert('Mic access denied.\nOpen page over https:// and allow mic access.'); ctx.close();ctx=null;return false; }
  return true;
}

// ── record
async function startRec(type){
  if(!(await init())) return;
  if(ctx.state==='suspended') await ctx.resume();
  recType=type; chunks=[]; recording=true;
  const mime=['audio/webm;codecs=opus','audio/webm','audio/ogg','audio/mp4'].find(t=>MediaRecorder.isTypeSupported(t))||'';
  try{ recorder=new MediaRecorder(stream,mime?{mimeType:mime}:{}); }
  catch(e){ recorder=new MediaRecorder(stream); }
  recorder.ondataavailable=e=>{ if(e.data.size>0) chunks.push(e.data); };
  recorder.onstop=finishRec;
  recorder.start(50);
  if(type==='layer'&&loopDur>0){
    const el=(ctx.currentTime-loopStart)%loopDur;
    const rem=(loopDur-el)*1000;
    autoStop=setTimeout(stopRec,rem);
  }
  ui();
}

function stopRec(){
  clearTimeout(autoStop);
  if(!recorder||recorder.state==='inactive') return;
  recorder.stop(); recording=false; ui();
}

async function finishRec(){
  if(!chunks.length){ui();return;}
  const blob=new Blob(chunks,{type:chunks[0].type||'audio/webm'});
  const ab=await blob.arrayBuffer();
  let buf;
  try{ buf=await ctx.decodeAudioData(ab); }
  catch(e){ setStatus('decode error'); ui(); return; }

  if(recType==='first'){
    loopDur=buf.duration; loopStart=ctx.currentTime;
    addTrack(buf); scheduleAll(); startAnim();
  } else {
    addTrack(fitBuf(buf)); scheduleTrack(tracks[tracks.length-1]);
  }
  ui();
}

function fitBuf(b){
  const n=Math.round(loopDur*ctx.sampleRate);
  const out=ctx.createBuffer(b.numberOfChannels,n,ctx.sampleRate);
  for(let c=0;c<b.numberOfChannels;c++){
    const s=b.getChannelData(c),d=out.getChannelData(c);
    d.set(s.subarray(0,Math.min(s.length,n)));
  }
  return out;
}

// ── tracks
function addTrack(buf){
  const gain=ctx.createGain(); gain.connect(ctx.destination);
  const t={id:Date.now(),buf,gain,srcs:[],muted:false,num:tracks.length+1};
  tracks.push(t); renderTrack(t); return t;
}

function scheduleTrack(t){
  stopSrcs(t); if(t.muted) return;
  const now=ctx.currentTime;
  const el=(now-loopStart)%loopDur;
  playLoop(t,now,el);
}

function scheduleAll(){ tracks.forEach(scheduleTrack); }

function playLoop(t,when,offset){
  const s=ctx.createBufferSource(); s.buffer=t.buf; s.connect(t.gain);
  const dur=t.buf.duration, rem=dur-offset;
  const fade=Math.min(0.005,rem*0.01);
  t.gain.gain.cancelScheduledValues(when);
  t.gain.gain.setValueAtTime(0,when);
  t.gain.gain.linearRampToValueAtTime(1,when+fade);
  s.start(when,offset);
  s.onended=()=>{ if(!tracks.find(x=>x.id===t.id)||t.muted)return; playLoop(t,when+rem,0); };
  t.srcs.push(s);
}

function stopSrcs(t){ t.srcs.forEach(s=>{try{s.onended=null;s.stop();}catch(e){}}); t.srcs=[]; }

function muteTrack(id){
  const t=tracks.find(x=>x.id===id); if(!t)return;
  t.muted=!t.muted;
  if(t.muted){ t.gain.gain.linearRampToValueAtTime(0,ctx.currentTime+0.02); setTimeout(()=>stopSrcs(t),30); }
  else{ scheduleTrack(t); }
  const el=document.querySelector(`[data-id="${id}"]`);
  if(el){ el.querySelector('.tbtn').textContent=t.muted?'unmute':'mute'; el.querySelector('.tbtn').classList.toggle('muted',t.muted); }
}

function delTrack(id){
  const t=tracks.find(x=>x.id===id); if(!t)return;
  stopSrcs(t); t.gain.disconnect(); tracks=tracks.filter(x=>x.id!==id);
  document.querySelector(`[data-id="${id}"]`)?.remove();
  tracks.forEach((x,i)=>{ x.num=i+1; const n=document.querySelector(`[data-id="${x.id}"] .tnum`); if(n)n.textContent=String(x.num).padStart(2,'0'); });
  ui();
}

function undo(){ if(!tracks.length)return; const l=tracks[tracks.length-1]; delTrack(l.id); if(!tracks.length)clearAll(); }

function clearAll(){
  tracks.forEach(t=>{stopSrcs(t);t.gain.disconnect();}); tracks=[];
  loopDur=0; loopStart=0; cancelAnimationFrame(raf);
  trackList.innerHTML=''; trackList.appendChild(emptyMsg);
  ringFg.style.strokeDashoffset=CIRC;
  ringTime.textContent='--'; ringLbl.textContent='no loop'; ui();
}

// ── render
function renderTrack(t){
  if(emptyMsg.parentNode) emptyMsg.remove();
  const el=document.createElement('div');
  el.className='track'; el.dataset.id=t.id;
  el.innerHTML=`<div class="tnum">${String(t.num).padStart(2,'0')}</div><div class="tbar"><canvas></canvas><div class="tph"></div></div><button class="tbtn">mute</button><button class="tbtn del">del</button>`;
  const cv=el.querySelector('canvas');
  // draw waveform
  const W=200,H=24; cv.width=W*devicePixelRatio; cv.height=H*devicePixelRatio;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  const c=cv.getContext('2d'); c.scale(devicePixelRatio,devicePixelRatio);
  const d=t.buf.getChannelData(0), step=Math.max(1,Math.floor(d.length/W)), mid=H/2;
  c.strokeStyle='rgba(60,220,120,.65)'; c.lineWidth=1; c.beginPath();
  for(let x=0;x<W;x++){
    let mn=1,mx=-1;
    for(let j=0;j<step;j++){const v=d[x*step+j]||0;if(v<mn)mn=v;if(v>mx)mx=v;}
    c.moveTo(x,mid+mn*mid*.85); c.lineTo(x,mid+mx*mid*.85);
  }
  c.stroke();
  el.querySelector('.tbtn').onclick=()=>muteTrack(t.id);
  el.querySelectorAll('.tbtn')[1].onclick=()=>delTrack(t.id);
  trackList.appendChild(el);
}

// ── ring animation
function startAnim(){ cancelAnimationFrame(raf); animFrame(); }
function animFrame(){
  if(!ctx||!loopDur) return;
  const el=(ctx.currentTime-loopStart)%loopDur, prog=el/loopDur;
  ringFg.style.strokeDashoffset=CIRC*(1-prog);
  ringTime.textContent=(loopDur-el).toFixed(1)+'s';
  document.querySelectorAll('.tph').forEach(p=>p.style.left=(prog*100)+'%');
  raf=requestAnimationFrame(animFrame);
}

// ── ui state
function setStatus(t){ status.textContent=t; }
function ui(){
  const hasLoop=loopDur>0, isRec=recording;
  btnRec.disabled=isRec;
  btnRec.classList.toggle('rec',isRec&&recType==='first');
  btnLay.disabled=!hasLoop||isRec;
  btnLay.classList.toggle('rec',isRec&&recType==='layer');
  btnStp.disabled=!isRec;
  btnUnd.disabled=!tracks.length||isRec;
  btnClr.disabled=!tracks.length||isRec;
  if(isRec) setStatus(recType==='first'?'recording loop…':'recording layer…');
  else if(hasLoop) setStatus(`playing · ${tracks.length} layer${tracks.length!==1?'s':''}`);
  else setStatus('ready');
  if(hasLoop) ringLbl.textContent=loopDur.toFixed(2)+'s loop';
  ringFg.classList.toggle('rec',isRec);
}

// ── wire buttons
btnRec.onclick=()=>startRec('first');
btnLay.onclick=()=>startRec('layer');
btnStp.onclick=stopRec;
btnUnd.onclick=undo;
btnClr.onclick=clearAll;
</script>

</body>
</html>
